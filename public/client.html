<!DOCTYPE html>
<html>
<head>
<title>Client Panel</title>

<style>
body{
font-family:Arial;
background:#f3f6fb;
margin:0;
}

.header{
background:#111827;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#111827;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

select{
padding:6px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>Credit Card Client Panel</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h3>Credit Card Applications</h3>

<table>

<thead>

<tr>
<th>ARN</th>
<th>Customer</th>
<th>City</th>
<th>Product</th>
<th>Application Date</th>
<th>Pincode</th>
<th>Status</th>
<th>Update</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const user=JSON.parse(localStorage.getItem("user"))

if(!user||user.role!=="client"){
window.location="/login.html"
}

function logout(){
localStorage.removeItem("user")
window.location="/login.html"
}

async function loadLeads(){

const res=await fetch("/client-sales")
const data=await res.json()

const table=document.getElementById("table")
table.innerHTML=""

data.sales.forEach(l=>{

table.innerHTML+=`

<tr>

<td>${l.arn||""}</td>
<td>${l.customer_name||""}</td>
<td>${l.city||""}</td>
<td>${l.product_applied||""}</td>
<td>${l.application_date||""}</td>
<td>${l.pincode||""}</td>
<td>${l.status}</td>

<td>

<select onchange="updateStatus(${l.id},this.value)">

<option value="">Select</option>
<option value="pending">Pending</option>
<option value="in process">In Process</option>
<option value="approved">Approved</option>
<option value="rejected">Rejected</option>

</select>

</td>

</tr>

`

})

}

async function updateStatus(id,status){

if(!status)return

await fetch("/client-sale-status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})

loadLeads()

}

loadLeads()

</script>

</body>
</html>
