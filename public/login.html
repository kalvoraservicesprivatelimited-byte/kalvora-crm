<!DOCTYPE html>
<html>
<head>
  <title>CRM Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      width: 300px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #1a252f;
    }

    #msg {
      margin-top: 10px;
      text-align: center;
      color: red;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>CRM Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="msg"></div>
</div>

<script>

async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      password: password
    })
  });

  const data = await res.json();

  if (data.success) {

    if (data.user.role === "admin") {
      window.location.href = "/index.html";
    }

    else if (data.user.role === "agent") {
      window.location.href = "/agent.html";
    }

  } else {

    document.getElementById("msg").innerText = "Invalid login";

  }

}

</script>

</body>
</html>
